name: CI

on:
  pull_request:
  push:
    branches: [ master ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: zatresi
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: zatresi-api_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U zatresi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y curl libjemalloc2 libvips libpq-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      # levenshtein-ffi does not declare its C extension in the gemspec, so
      # bundler never compiles it (the Dockerfile builds it manually too)
      - name: Build levenshtein-ffi native extension
        run: |
          cd "$(bundle show levenshtein-ffi)/ext/levenshtein"
          ruby extconf.rb
          make CFLAGS="-fPIC -Wno-incompatible-pointer-types"

      - name: Run tests
        env:
          RAILS_ENV: test
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: |
          bin/rails db:test:prepare
          bundle exec rspec spec/
